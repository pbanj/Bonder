# =============================================================================
# SearXNG Configuration - "Bonder" Assistant Edition (April 2026)
# =============================================================================
use_default_settings: false # Disables default engines to save resources and speed up the searching.

general:
  instance_name: "SearXNG"
  enable_metrics: false
  enable_limiter: false
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  
brand:
  docs_url: https://docs.searxng.org/
  issue_url: https://github.com/searxng/searxng/issues

ui:
  static_path: ""
  templates_path: ""
  query_in_title: true
  infinite_scroll: false
  center_alignment: false
  theme_args:
    oscar_style: "logy"

plugins:
  searx.plugins.calculator.SXNGPlugin:
    active: true
  searx.plugins.unit_converter.SXNGPlugin:
    active: true
  searx.plugins.ahmia_filter.SXNGPlugin:
    active: false

# --- DOI (Digital Object Identifier) RESOLVERS ---
# A DOI is a permanent "serial number" for academic papers, datasets, and reports.
# These resolvers ensure that when SearXNG finds a DOI (like 10.1093/example), 
# it can transform it into a clickable link that points to the actual document.
# If this section is missing while 'use_default_settings' is false, the engine 
# will crash with a 'KeyError' when it tries to process scholarly results.
doi_resolvers:
  oadoi.org: "https://oadoi.org/"   # Primary resolver for Open Access (free) papers
  sci-hub: "https://sci-hub.se/"     # Alternative resolver for reaching paywalled research

default_doi_resolver: "oadoi.org"    # The fallback service used if no others are specified

outputs:
  json: # Essential for the Bender/Home Assistant bridge.
    format: "json"
    content_type: "application/json"

search:
  safe_search: 1
  autocomplete: "duckduckgo"
  default_lang: "en-US"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  formats:
    - html
    - json
    
server:
  port: 8080
  bind_address: "0.0.0.0"
  public_instance: false  
  secret_key: "CHANGEMECHANGEMECHANGEMECHANGEMECHANGEMECHANGEMECHANGEME"
  http_protocol_version: "1.0"
  method: "POST"

categories_as_tabs:
  general:
  it:
  science:
  map:

engines:
  # --- PRIMARY SEARCH ---
  - name: braveapi
    # High-quality, independent search index; privacy-first and great for AI grounding.
    engine: braveapi
    api_key: "CHANGEMECHANGEMECHANGEMECHANGEMECHANGEME"
    shortcut: brv
    inactive: false
    categories: general

  - name: duckduckgo
    # Privacy-focused engine that doesn't track or profile "meatbags."
    engine: duckduckgo
    shortcut: ddg
    categories: general

  - name: startpage
    # Delivers Google/Bing results via proxy for maximum anonymity.
    engine: startpage
    shortcut: sp
    categories: general

  # --- KNOWLEDGE BASES ---
  - name: wikipedia
    # The ultimate crowd-sourced knowledge base for Bender's basic facts.
    engine: wikipedia
    shortcut: wp
    display_type: ["infobox"]
    categories: general

  - name: imdb
    # Global database for movies, TV, and cast info.
    engine: imdb
    shortcut: imdb
    categories: general

  - name: encyclosearch
    # Aggregator that searches over a dozen encyclopedias at once.
    engine: json_engine
    shortcut: es
    categories: general
    search_url: https://encyclosearch.org/encyclosphere/search?q={query}&page={pageno}&resultsPerPage=15
    results_query: Results
    url_query: SourceURL
    title_query: Title
    content_query: Description

  - name: openstreetmap
    # Free, community-driven geospatial data; the "Wikipedia of maps."
    engine: openstreetmap
    shortcut: osm
    categories: map

  - name: steam
    # Search for PC games, pricing, and reviews on the Steam store.
    engine: steam
    shortcut: stm
    categories: general

  # --- WIKIMEDIA NETWORK ---
  - name: wikibooks
    # Open-content textbooks and annotated texts.
    engine: mediawiki
    shortcut: wb
    base_url: "https://{language}.wikibooks.org/"
    categories: general

  - name: wikinews
    # Collaborative news source for real-time (but manual) reporting.
    engine: mediawiki
    shortcut: wn
    base_url: "https://{language}.wikinews.org/"
    categories: general

  - name: wikiquote
    # Vast collection of quotations from famous people and literary works.
    engine: mediawiki
    shortcut: wq
    base_url: "https://{language}.wikiquote.org/"
    categories: general

  - name: wikisource
    # Library of free-content primary source texts.
    engine: mediawiki
    shortcut: ws
    base_url: "https://{language}.wikisource.org/"
    categories: general

  - name: wikispecies
    # Free directory for all species of animals, plants, and life.
    engine: mediawiki
    shortcut: wsp
    base_url: "https://species.wikimedia.org/"
    categories: science

  - name: wiktionary
    # Collaborative dictionary for etymology, pronunciations, and synonyms.
    engine: mediawiki
    shortcut: wt
    base_url: "https://{language}.wiktionary.org/"
    categories: general

  - name: wikiversity
    # Learning resources and research materials for all levels of education.
    engine: mediawiki
    shortcut: wv
    base_url: "https://{language}.wikiversity.org/"
    categories: general

  - name: wikivoyage
    # Open-source travel guide for cities and destinations.
    engine: mediawiki
    shortcut: wy
    base_url: "https://{language}.wikivoyage.org/"
    categories: map

  # --- GAMING & UTILITY ---
  - name: minecraft wiki
    # Definitive source for crafting, game mechanics, and updates.
    engine: mediawiki
    shortcut: mcw
    base_url: https://minecraft.wiki/
    api_path: "api.php"
    categories: [it, general]

  - name: currency
    # Real-time tool for converting between global "meatbag" currencies.
    engine: currency_convert
    shortcut: cc
    categories: general

  - name: pubmed
    # Massive database for biomedical and life sciences literature.
    engine: pubmed
    shortcut: pub
    categories: science