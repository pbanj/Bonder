alias: Benders Memory Tool
description: Save user preferences, habits, or memos to the persistent Black Book.
fields:
  user:
    description: The name of the person this memory is about.
    example: Rhi
    selector:
      text: {}
  tag:
    description: The category of the memory. MUST be exactly PREF, HABIT, or MEMO.
    example: PREF
    selector:
      select:
        options:
          - PREF
          - HABIT
          - MEMO
  content:
    description: The information to save.
    example: Favorite color is purple.
    selector:
      text: {}
sequence:
  - target:
      entity_id: notify.benders_memory
    data:
      message: "- **[{{ tag }}] ({{ user }})**: {{ content }}"
    action: notify.send_message
mode: queued
